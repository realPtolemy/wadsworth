repos:
  # c++ formatter
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.0
    hooks:
      - id: clang-format

  # c++ linter
  - repo: https://github.com/cpplint/cpplint
    rev: 2.0.2
    hooks:
      - id: cpplint

  # python formatter
  - repo: https://github.com/google/yapf
    rev: v0.43.0
    hooks:
      - id: yapf

  # python linter
  - repo: https://github.com/PyCQA/pylint
    rev: v4.0.5
    hooks:
      - id: pylint
        args: ["--rcfile=.pylintrc"]
